server:
  address: ":8080"
  read_timeout: 30s
  write_timeout: 120s

providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    keys:
      - key: "${OPENROUTER_API_KEY}"
        weight: 1

  openai:
    base_url: https://api.openai.com/v1
    keys:
      - key: "${OPENAI_API_KEY}"
        weight: 1

  anthropic:
    base_url: https://api.anthropic.com/v1
    keys:
      - key: "${ANTHROPIC_API_KEY}"
        weight: 1

routing:
  default_provider: openrouter

  models:
    "gpt-4o":
      providers: [openai, openrouter]
      strategy: priority
    "gpt-4o-mini":
      providers: [openai, openrouter]
      strategy: priority
    "claude-sonnet-4-20250514":
      providers: [anthropic, openrouter]
      strategy: priority
    "claude-haiku-4-5-20251001":
      providers: [anthropic, openrouter]
      strategy: priority

  failover:
    enabled: true
    max_retries: 3
    backoff:
      initial: 100ms
      multiplier: 2.0
      max: 5s
    retry_on: [429, 500, 502, 503, 504]

cache:
  enabled: true
  ttl: 5m               # Time-to-live for cached responses
  max_entries: 10000     # Maximum number of cached responses (LRU eviction)

plugins:
  ratelimit:
    requests_per_minute: 60  # token bucket rate limit
    per_ip: false            # false = global, true = per client IP
  requestlog:
    level: info              # debug | info | warn | error
    log_bodies: false        # log request/response bodies (truncated)
    body_max_bytes: 1024     # max body bytes to log
  metrics: {}                # Prometheus metrics at GET /metrics (OTel-based)
