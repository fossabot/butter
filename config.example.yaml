server:
  address: ":8080"
  read_timeout: 30s
  write_timeout: 120s

providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    keys:
      - key: "${OPENROUTER_API_KEY}"
        weight: 1

  openai:
    base_url: https://api.openai.com/v1
    keys:
      - key: "${OPENAI_API_KEY}"
        weight: 1

routing:
  default_provider: openrouter

  models:
    "gpt-4o":
      providers: [openai, openrouter]
      strategy: priority
    "gpt-4o-mini":
      providers: [openai, openrouter]
      strategy: priority

  failover:
    enabled: true
    max_retries: 3
    backoff:
      initial: 100ms
      multiplier: 2.0
      max: 5s
    retry_on: [429, 500, 502, 503, 504]
